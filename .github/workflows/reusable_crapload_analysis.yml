# Reusable CRAP Load Analysis Workflow
# =====================================
# Runs CRAP (Change Risk Anti-Patterns) analysis on Go code using Gaze.
# Compares results against a committed baseline and reports regressions,
# improvements, and new functions. The caller is responsible for posting
# PR comments using the uploaded artifact.
#
# SPDX-License-Identifier: Apache-2.0

name: Reusable CRAP Load Analysis

on:
  workflow_call:
    inputs:
      go-version-file:
        description: 'Path to go.mod for Go version detection'
        type: string
        default: './go.mod'
      gaze-version:
        description: 'Gaze version tag to install via go install'
        type: string
        default: 'latest'
      baseline-file:
        description: 'Path to committed baseline thresholds file'
        type: string
        default: '.gaze/baseline.json'
      packages:
        description: 'Go packages to analyse'
        type: string
        default: './...'
      coverprofile:
        description: 'Path to coverage profile'
        type: string
        default: 'coverage.out'
      new-function-threshold:
        description: 'CRAP score ceiling for new functions with no baseline entry'
        type: number
        default: 30
      regression-epsilon:
        description: >-
          Minimum CRAP/GazeCRAP score delta to flag a regression.
          Differences within this tolerance are treated as noise
          from platform, toolchain, or test-ordering variance.
        required: false
        type: number
        default: 0.5
    outputs:
      status:
        description: 'pass or fail'
        value: ${{ jobs.crapload-analysis.outputs.status }}
      crapload-count:
        description: 'Number of functions at or above CRAP threshold'
        value: ${{ jobs.crapload-analysis.outputs.crapload-count }}
      gaze-crapload-count:
        description: 'Number of functions at or above GazeCRAP threshold'
        value: ${{ jobs.crapload-analysis.outputs.gaze-crapload-count }}
      regressions-count:
        description: 'Number of functions that regressed vs baseline'
        value: ${{ jobs.crapload-analysis.outputs.regressions-count }}
      improvements-count:
        description: 'Number of functions that improved vs baseline'
        value: ${{ jobs.crapload-analysis.outputs.improvements-count }}

permissions:
  contents: read

jobs:
  crapload-analysis:
    name: CRAP Load Analysis
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.compare.outputs.status }}
      crapload-count: ${{ steps.compare.outputs.crapload_count }}
      gaze-crapload-count: ${{ steps.compare.outputs.gaze_crapload_count }}
      regressions-count: ${{ steps.compare.outputs.regressions_count }}
      improvements-count: ${{ steps.compare.outputs.improvements_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout org-infra scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .workflow-scripts
          sparse-checkout: scripts
          persist-credentials: false

      - name: Detect changed packages
        id: detect-changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CHANGED_FILES=$(git diff --name-only "${BASE_SHA}..HEAD" -- '*.go' ':!vendor' ':!*/vendor' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "packages=" >> "$GITHUB_OUTPUT"
            echo "No Go files changed in this PR."
            exit 0
          fi
          PACKAGES=$(echo "$CHANGED_FILES" | xargs -I{} dirname {} | grep -v '/vendor/' | grep -v '^vendor' | sort -u | sed 's|^|./|' | paste -sd ' ')
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Changed packages: $PACKAGES"

      - name: Handle no code changes
        if: github.event_name == 'pull_request' && steps.detect-changes.outputs.has_changes == 'false'
        id: no-changes
        run: |
          echo "skip=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' '<!-- crapload-analysis-marker -->' '## CRAP Load Analysis' '' \
            'No Go code changes detected in this PR. No CRAP impact.' > /tmp/crapload-comment-body.md

      - name: Resolve Go version source
        if: steps.no-changes.outputs.skip != 'true'
        id: go-version-source
        env:
          GO_VERSION_FILE: ${{ inputs.go-version-file }}
        run: |
          if [[ -f "$GO_VERSION_FILE" ]]; then
            echo "go-version-file=$GO_VERSION_FILE" >> "$GITHUB_OUTPUT"
            echo "go-version=" >> "$GITHUB_OUTPUT"
          else
            echo "go-version-file=" >> "$GITHUB_OUTPUT"
            echo "go-version=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.no-changes.outputs.skip != 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ steps.go-version-source.outputs.go-version-file }}
          go-version: ${{ steps.go-version-source.outputs.go-version }}

      - name: Auto-detect packages for multi-module repos
        if: steps.no-changes.outputs.skip != 'true'
        id: resolve-packages
        env:
          DETECTED_PACKAGES: ${{ steps.detect-changes.outputs.packages }}
          PACKAGES_INPUT: ${{ inputs.packages }}
        run: |
          # In PR mode, detect-changes already scoped to changed files
          if [ -n "$DETECTED_PACKAGES" ]; then
            echo "packages=$DETECTED_PACKAGES" >> "$GITHUB_OUTPUT"
            echo "Using PR-scoped packages: $DETECTED_PACKAGES"
            exit 0
          fi

          # Use the resolution script for consistent behavior
          RESOLVED=$(bash .workflow-scripts/scripts/resolve-go-packages.sh "$PACKAGES_INPUT")
          echo "packages=$RESOLVED" >> "$GITHUB_OUTPUT"

      - name: Install Gaze
        if: steps.no-changes.outputs.skip != 'true'
        id: install-gaze
        env:
          GOTOOLCHAIN: auto
          GAZE_VERSION: ${{ inputs.gaze-version }}
        run: |
          echo "Installing gaze@${GAZE_VERSION}..."
          go install "github.com/unbound-force/gaze/cmd/gaze@${GAZE_VERSION}"
          gaze --version || echo "gaze installed (version flag may not be supported)"

      - name: Generate coverage profile
        if: steps.no-changes.outputs.skip != 'true'
        env:
          PKGS: ${{ steps.resolve-packages.outputs.packages }}
          COVERPROFILE: ${{ inputs.coverprofile }}
        run: |
          read -ra pkg_array <<< "$PKGS"
          echo "Running tests with coverage for: ${pkg_array[*]}"
          go test -coverprofile="${COVERPROFILE}" "${pkg_array[@]}" || \
            echo "::warning::Some tests failed; coverage data may be incomplete"

      - name: Configure baseline settings
        if: steps.no-changes.outputs.skip != 'true'
        env:
          EPSILON: ${{ inputs.regression-epsilon }}
          NEW_FUNC_THRESHOLD: ${{ inputs.new-function-threshold }}
        run: |
          # Write .gaze.yaml from workflow inputs when the consumer
          # repo does not already have one. This preserves backward
          # compatibility for repos that set epsilon/threshold via
          # workflow inputs rather than .gaze.yaml.
          if [ ! -f .gaze.yaml ]; then
            cat > .gaze.yaml <<EOF
          baseline:
            epsilon: ${EPSILON}
            new_function_threshold: ${NEW_FUNC_THRESHOLD}
          EOF
            echo "Wrote .gaze.yaml from workflow inputs."
          else
            echo "Using existing .gaze.yaml from repository."
          fi

      - name: Run Gaze analysis
        if: steps.no-changes.outputs.skip != 'true'
        id: gaze-analysis
        env:
          PKGS: ${{ steps.resolve-packages.outputs.packages }}
          COVERPROFILE: ${{ inputs.coverprofile }}
        run: |
          read -ra pkg_array <<< "$PKGS"
          gaze report \
            --format=json \
            --coverprofile="${COVERPROFILE}" \
            "${pkg_array[@]}" 2>/tmp/gaze-stderr.txt \
            > /tmp/gaze-report.json || true
          echo "Gaze analysis complete."
          cat /tmp/gaze-stderr.txt >&2 || true

      - name: Compare against baseline
        if: steps.no-changes.outputs.skip != 'true'
        id: compare
        env:
          BASELINE: ${{ inputs.baseline-file }}
          PKGS: ${{ steps.resolve-packages.outputs.packages }}
          COVERPROFILE: ${{ inputs.coverprofile }}
          GAZE_VERSION: ${{ inputs.gaze-version }}
        run: |
          read -ra pkg_array <<< "$PKGS"

          BASELINE_FLAG=""
          HAS_BASELINE="false"
          if [ -f "$BASELINE" ] && [ -s "$BASELINE" ]; then
            BASELINE_FLAG="--baseline=${BASELINE}"
            HAS_BASELINE="true"
          fi

          # Run gaze crap with baseline comparison (when available).
          # gaze crap exits 1 on regression/violation — capture exit
          # code but don't fail the step yet.
          # shellcheck disable=SC2086
          gaze crap \
            --format=json \
            --coverprofile="${COVERPROFILE}" \
            ${BASELINE_FLAG} \
            "${pkg_array[@]}" > /tmp/crapload-current.json 2>/tmp/gaze-crap-stderr.txt || true
          cat /tmp/gaze-crap-stderr.txt >&2 || true

          # Extract outputs from gaze crap JSON.
          CRAPLOAD=$(jq -r '.summary.crapload // 0' /tmp/crapload-current.json)
          GAZE_CRAPLOAD=$(jq -r '.summary.gaze_crapload // 0' /tmp/crapload-current.json)

          if [ "$HAS_BASELINE" = "true" ]; then
            PASSED=$(jq -r '.comparison.passed // true' /tmp/crapload-current.json)
            REGRESSIONS=$(jq -r '.comparison.regressions // 0' /tmp/crapload-current.json)
            IMPROVEMENTS=$(jq -r '.comparison.improvements // 0' /tmp/crapload-current.json)
            if [ "$PASSED" = "true" ]; then
              STATUS="pass"
            else
              STATUS="fail"
            fi
          else
            REGRESSIONS=0
            IMPROVEMENTS=0
            STATUS="pass"
          fi

          {
            echo "status=${STATUS}"
            echo "crapload_count=${CRAPLOAD}"
            echo "gaze_crapload_count=${GAZE_CRAPLOAD}"
            echo "regressions_count=${REGRESSIONS}"
            echo "improvements_count=${IMPROVEMENTS}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR comment
        if: steps.no-changes.outputs.skip != 'true'
        env:
          BASELINE: ${{ inputs.baseline-file }}
          GAZE_VERSION: ${{ inputs.gaze-version }}
          STATUS: ${{ steps.compare.outputs.status }}
        run: |
          CRAP_JSON="/tmp/crapload-current.json"
          REPORT_JSON="/tmp/gaze-report.json"

          # Extract summary metrics from gaze crap JSON.
          TOTAL_FUNCS=$(jq -r '.summary.total_functions // 0' "$CRAP_JSON")
          AVG_COMPLEXITY=$(jq -r '(.summary.avg_complexity // 0) * 10 | round / 10' "$CRAP_JSON")
          AVG_LINE_COV=$(jq -r '(.summary.avg_line_coverage // 0) * 10 | round / 10' "$CRAP_JSON")
          AVG_CRAP=$(jq -r '(.summary.avg_crap // 0) * 10 | round / 10' "$CRAP_JSON")
          CRAP_THRESH=$(jq -r '.summary.crap_threshold // 15' "$CRAP_JSON")
          CRAPLOAD=$(jq -r '.summary.crapload // 0' "$CRAP_JSON")
          AVG_CONTRACT_COV=$(jq -r '(.summary.avg_contract_coverage // 0) * 10 | round / 10' "$CRAP_JSON")
          AVG_GAZE_CRAP=$(jq -r '(.summary.avg_gaze_crap // 0) * 10 | round / 10' "$CRAP_JSON")
          GAZE_CRAP_THRESH=$(jq -r '.summary.gaze_crap_threshold // 15' "$CRAP_JSON")
          GAZE_CRAPLOAD=$(jq -r '.summary.gaze_crapload // 0' "$CRAP_JSON")
          REG_COUNT=$(jq -r '.comparison.regressions // 0' "$CRAP_JSON")
          IMP_COUNT=$(jq -r '.comparison.improvements // 0' "$CRAP_JSON")
          NEW_COUNT=$(jq -r '(.comparison.new_functions // 0) + (.comparison.new_violations // 0)' "$CRAP_JSON")

          # No-baseline path: generate quickstart comment.
          if [ ! -f "$BASELINE" ] || [ ! -s "$BASELINE" ]; then
            cat > /tmp/crapload-comment-body.md <<EOF
          <!-- crapload-analysis-marker -->
          ## &#x2705; CRAP Load Analysis: PASS (no baseline)

          No baseline file found at \`${BASELINE}\`. Showing current scores without regression detection.

          ### How to Enable Regression Detection

          Generate and commit a baseline file to track CRAP score changes over time:

          \`\`\`bash
          # 1. Install gaze
          go install github.com/unbound-force/gaze/cmd/gaze@${GAZE_VERSION}

          # 2. Run tests and generate baseline
          go test -coverprofile=coverage.out ./...
          mkdir -p .gaze
          gaze crap --format=json --coverprofile=coverage.out ./... > .gaze/baseline.json

          # 3. Commit the baseline
          git add .gaze/baseline.json
          git commit -m "chore: add CRAP baseline for regression detection"
          \`\`\`

          **For more information**:
          - [Gaze README](https://github.com/unbound-force/gaze/blob/main/README.md)
          - [CI Integration Guide](https://github.com/unbound-force/gaze/blob/main/docs/guides/ci-integration.md)

          ### Summary

          | Metric | Value |
          |--------|-------|
          | Functions analysed | ${TOTAL_FUNCS} |
          | Avg complexity | ${AVG_COMPLEXITY} |
          | Avg line coverage | ${AVG_LINE_COV}% |
          | Avg CRAP score | ${AVG_CRAP} |
          | CRAPload (>= ${CRAP_THRESH}) | ${CRAPLOAD} |
          | Avg contract coverage | ${AVG_CONTRACT_COV}% |
          | Avg GazeCRAP score | ${AVG_GAZE_CRAP} |
          | GazeCRAPload (>= ${GAZE_CRAP_THRESH}) | ${GAZE_CRAPLOAD} |

          [View full analysis logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          EOF
            exit 0
          fi

          # Baseline path: generate full comparison comment.
          STATUS_BADGE="&#x2705;"
          STATUS_TEXT="PASS"
          if [ "$STATUS" = "fail" ]; then
            STATUS_BADGE="&#x274C;"
            STATUS_TEXT="FAIL"
          fi

          cat > /tmp/crapload-comment-body.md <<EOF
          <!-- crapload-analysis-marker -->
          ## ${STATUS_BADGE} CRAP Load Analysis: ${STATUS_TEXT}

          ### Summary

          | Metric | Value |
          |--------|-------|
          | Functions analysed | ${TOTAL_FUNCS} |
          | Avg complexity | ${AVG_COMPLEXITY} |
          | Avg line coverage | ${AVG_LINE_COV}% |
          | Avg CRAP score | ${AVG_CRAP} |
          | CRAPload (>= ${CRAP_THRESH}) | ${CRAPLOAD} |
          | Avg contract coverage | ${AVG_CONTRACT_COV}% |
          | Avg GazeCRAP score | ${AVG_GAZE_CRAP} |
          | GazeCRAPload (>= ${GAZE_CRAP_THRESH}) | ${GAZE_CRAPLOAD} |
          | Regressions | ${REG_COUNT} |
          | Improvements | ${IMP_COUNT} |
          | New functions | ${NEW_COUNT} |
          EOF

          # Add quality metrics from gaze report if available.
          QUALITY_COV=$(jq -r '(.quality.summary.average_contract_coverage // empty) * 10 | round / 10' "$REPORT_JSON" 2>/dev/null || true)
          if [ -n "$QUALITY_COV" ]; then
            QUALITY_OVERSPEC=$(jq -r '(.quality.summary.average_over_specification // 0) * 10 | round / 10' "$REPORT_JSON" 2>/dev/null || echo "0")
            printf '| Avg contract coverage (quality) | %s%% |\n' "$QUALITY_COV" >> /tmp/crapload-comment-body.md
            printf '| Avg over-specification | %s%% |\n' "$QUALITY_OVERSPEC" >> /tmp/crapload-comment-body.md
          fi

          # Add quadrant distribution from gaze report if available.
          Q1=$(jq -r '.crap.summary.quadrant_counts.Q1_Safe // empty' "$REPORT_JSON" 2>/dev/null || true)
          if [ -n "$Q1" ]; then
            Q2=$(jq -r '.crap.summary.quadrant_counts.Q2_ComplexButTested // 0' "$REPORT_JSON" 2>/dev/null || echo "0")
            Q3=$(jq -r '.crap.summary.quadrant_counts.Q3_SimpleButUnderspecified // 0' "$REPORT_JSON" 2>/dev/null || echo "0")
            Q4=$(jq -r '.crap.summary.quadrant_counts.Q4_Dangerous // 0' "$REPORT_JSON" 2>/dev/null || echo "0")
            cat >> /tmp/crapload-comment-body.md <<EOF

          ### Quadrant Distribution

          | Quadrant | Count |
          |----------|-------|
          | Q1 Safe | ${Q1} |
          | Q2 Complex but Tested | ${Q2} |
          | Q3 Simple but Underspecified | ${Q3} |
          | Q4 Dangerous | ${Q4} |
          EOF
          fi

          # Add regressions table from gaze crap comparison JSON.
          REGRESSIONS_TABLE=$(jq -r '
            [.scores[] | select(.status == "regression")] |
            if length > 0 then
              "\n### Regressions\n\n| Function | Baseline CRAP | Current CRAP | Delta | Baseline GazeCRAP | Current GazeCRAP | Delta |\n|----------|---------------|--------------|-------|-------------------|------------------|-------|\n" +
              (map("| `\(.file):\(.function)` | \(.baseline_crap // "N/A") | \(.crap) | \(.crap_delta // "N/A") | \(.baseline_gaze_crap // "N/A") | \(.gaze_crap // "N/A") | \(.gaze_crap_delta // "N/A") |") | join("\n"))
            else empty end
          ' "$CRAP_JSON" 2>/dev/null || true)
          if [ -n "$REGRESSIONS_TABLE" ]; then
            printf '%s\n' "$REGRESSIONS_TABLE" >> /tmp/crapload-comment-body.md
          fi

          # Add improvements table.
          IMPROVEMENTS_TABLE=$(jq -r '
            [.scores[] | select(.status == "improvement")] |
            if length > 0 then
              "\n### Improvements\n\n| Function | Baseline CRAP | Current CRAP | Delta | Baseline GazeCRAP | Current GazeCRAP | Delta |\n|----------|---------------|--------------|-------|-------------------|------------------|-------|\n" +
              (map("| `\(.file):\(.function)` | \(.baseline_crap // "N/A") | \(.crap) | \(.crap_delta // "N/A") | \(.baseline_gaze_crap // "N/A") | \(.gaze_crap // "N/A") | \(.gaze_crap_delta // "N/A") |") | join("\n"))
            else empty end
          ' "$CRAP_JSON" 2>/dev/null || true)
          if [ -n "$IMPROVEMENTS_TABLE" ]; then
            printf '%s\n' "$IMPROVEMENTS_TABLE" >> /tmp/crapload-comment-body.md
          fi

          # Add new functions table.
          NEW_FUNCS_TABLE=$(jq -r '
            .new_functions // [] |
            if length > 0 then
              "\n### New Functions\n\n| Status | Function | CRAP | GazeCRAP | Note |\n|--------|----------|------|----------|------|\n" +
              (map(
                (if .status == "new_violation" then "!+" else "+" end) as $icon |
                "| \($icon) | `\(.file):\(.function)` | \(.crap) | \(.gaze_crap // "N/A") | \(.status | gsub("_"; " ")) |"
              ) | join("\n"))
            else empty end
          ' "$CRAP_JSON" 2>/dev/null || true)
          if [ -n "$NEW_FUNCS_TABLE" ]; then
            printf '%s\n' "$NEW_FUNCS_TABLE" >> /tmp/crapload-comment-body.md
          fi

          # Add analysis warnings from gaze report if any.
          FAILED_STEPS=$(jq -r '.errors | to_entries[] | select(.value != null) | "- **\(.key)**: \(.value)"' "$REPORT_JSON" 2>/dev/null || true)
          if [ -n "$FAILED_STEPS" ]; then
            printf '\n### Analysis Warnings\n\n%s\n' "$FAILED_STEPS" >> /tmp/crapload-comment-body.md
          fi

          # Add footer.
          printf '\n[View full analysis logs](%s/%s/actions/runs/%s)\n' \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" >> /tmp/crapload-comment-body.md
      - name: Write step summary
        if: github.event_name == 'pull_request'
        run: cat /tmp/crapload-comment-body.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload analysis artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crapload-analysis
          path: /tmp/crapload-comment-body.md
          retention-days: 30

      - name: Upload detailed analysis
        if: steps.no-changes.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crapload-analysis-detailed
          path: |
            /tmp/gaze-report.json
            /tmp/crapload-current.json
          retention-days: 30

      - name: Enforce threshold
        if: steps.no-changes.outputs.skip != 'true'
        env:
          STATUS: ${{ steps.compare.outputs.status }}
        run: |
          if [ "$STATUS" = "fail" ]; then
            echo "::error::CRAP load check failed. See PR comment for details."
            exit 1
          fi
          echo "CRAP load check passed."
